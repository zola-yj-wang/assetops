<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <style>
    :root {
      --bg: #f4f7fc;
      --panel: #ffffff;
      --ink: #0f1f35;
      --muted: #5c6b82;
      --border: #d9e1ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 95% 0%, #dff4ec 0%, transparent 30%),
        radial-gradient(circle at 5% 5%, #e6ecff 0%, transparent 35%),
        var(--bg);
      padding: 24px;
    }
    .panel {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(15, 31, 53, 0.05);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 18px; color: var(--muted); }
    form { display: grid; gap: 12px; }
    label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 13px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #1d4ed8;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .errorlist, .errornote {
      color: #b91c1c;
      margin: 0 0 6px;
      padding-left: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1>AssetOps Login</h1>
    <p>Sign in with your Django account to access inventory operations.</p>
    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="errornote">{{ form.non_field_errors }}</div>
      {% endif %}
      <div>
        <label for="{{ form.username.id_for_label }}">Username</label>
        {{ form.username.errors }}
        {{ form.username }}
      </div>
      <div>
        <label for="{{ form.password.id_for_label }}">Password</label>
        {{ form.password.errors }}
        {{ form.password }}
      </div>
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
      <button type="submit">Login</button>
    </form>
  </section>
</body>
</html>
