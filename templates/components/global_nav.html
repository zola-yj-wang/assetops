<style>
  .global-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid #dbe3ef;
  }
  .global-nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .global-nav-brand {
    font-weight: 800;
    color: #0f1f35;
    letter-spacing: 0.02em;
    font-size: 14px;
    text-decoration: none;
  }
  .global-nav-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .global-nav-links a {
    text-decoration: none;
    color: #1d4ed8;
    background: #e8f0ff;
    border: 1px solid #c7d5ff;
    padding: 7px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
  }
  .global-nav-user {
    color: #5c6b82;
    font-size: 13px;
    font-weight: 700;
    margin-left: 4px;
  }
  .global-nav-links form {
    margin: 0;
  }
  .global-nav-links button {
    text-decoration: none;
    color: #b91c1c;
    background: #fdecec;
    border: 1px solid #f5c3c3;
    padding: 7px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
<nav class="global-nav">
  <div class="global-nav-inner">
    <a class="global-nav-brand" href="{% url 'assignment-dashboard' %}">AssetOps</a>
    <div class="global-nav-links">
      {% if request.user.is_authenticated %}
        <a href="{% url 'assignment-dashboard' %}">Assignment Dashboard</a>
        <a href="{% url 'asset-list' %}">Asset List</a>
        <a href="{% url 'asset-type-list' %}">Asset Types</a>
        <a href="{% url 'employee-list' %}">Employee List</a>
        <a href="/admin/">Admin</a>
        <span class="global-nav-user">{{ request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </div>
  </div>
</nav>
